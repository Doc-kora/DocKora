<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - DocKora</title>

<link rel="stylesheet" href="style.css">

<style>
.login-box{
max-width:400px;
margin:60px auto;
background:#1b1b1b;
padding:25px;
border-radius:15px;
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

.login-box button{
width:100%;
padding:12px;
background:#c40000;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}

.login-box a{
display:block;
text-align:center;
margin-top:15px;
color:#fff;
text-decoration:none;
}
</style>

</head>

<body>

<header>⚽ DocKora</header>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<button id="loginBtn">دخول</button>

<a href="register.html">إنشاء حساب جديد</a>

</div>
<script type="module" src="login.js"></script>
</body>
</html>
