<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب - DocKora</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#c40000;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.register-box{
    max-width:400px;
    margin:50px auto;
    background:#1b1b1b;
    padding:25px;
    border-radius:15px;
}

.register-box h2{
    text-align:center;
    margin-bottom:20px;
}

.register-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.register-box button{
    width:100%;
    padding:12px;
    background:#c40000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

.register-box button:hover{
    background:#e00000;
}

.register-box a{
    display:block;
    text-align:center;
    margin-top:15px;
    color:white;
    text-decoration:none;
}
</style>

</head>
<body>

<header>⚽ DocKora</header>

<div class="register-box">

<h2>إنشاء حساب</h2>

<input type="text" id="name" placeholder="mahmoud">

<input type="email" id="email" placeholder="mahmoudsayedelnoby@gmail.com">

<input type="password" id="password" "value="="200732">

<button id="registerBtn">إنشاء الحساب</button>

<a href="login.html">لديك حساب؟ سجل الدخول</a>

</div>

<script type="module" src="register.js"></script>

</body>
</html>
