<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - DocKora</title>

<link rel="stylesheet" href="style.css">

<style>
.admin{
max-width:700px;
margin:40px auto;
background:#1b1b1b;
padding:20px;
border-radius:15px;
}

.admin h2{
text-align:center;
margin-bottom:20px;
}

.admin input,
.admin textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

.admin textarea{
height:150px;
resize:none;
}

.admin button{
width:100%;
padding:12px;
background:#c40000;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.admin button:hover{
background:#e00000;
}
</style>

</head>
<body>

<header>⚽ DocKora Admin</header>

<div class="admin">

<h2>إضافة خبر جديد</h2>

<input type="text" id="title" placeholder="ريال مدريد يفوز على برشلونة 2-1">

<input type="text" id="image" placeholder="https://images.unsplash.com/photo-1547347298-4074fc3086f0?w=800">

<textarea id="content" placeholder="حقق ريال مدريد فوزًا مهمًا على برشلونة بنتيجة 2-1 في مباراة قوية ضمن منافسات الدوري الإسباني."></textarea>

<button id="publishBtn">نشر الخبر</button>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
